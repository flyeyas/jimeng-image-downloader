<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Src XPath Extractor</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f9;
        color: #1f2328;
      }

      .wrap {
        width: 420px;
        padding: 14px;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      p {
        margin: 0 0 10px;
        color: #57606a;
      }

      label {
        display: block;
        margin: 0 0 6px;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        min-height: 86px;
        resize: vertical;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #fff;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin: 10px 0;
      }

      button {
        border: 1px solid #d0d7de;
        background: #fff;
        color: #1f2328;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }

      button.primary {
        background: #0969da;
        color: #fff;
        border-color: #0969da;
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .status {
        min-height: 20px;
        margin: 0 0 10px;
        color: #0969da;
      }

      .status.error {
        color: #cf222e;
      }

      .results {
        max-height: 260px;
        overflow: auto;
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 8px;
      }

      .result-item {
        display: block;
        padding: 8px;
        border-radius: 6px;
        text-decoration: none;
        color: #0969da;
        word-break: break-all;
      }

      .result-item + .result-item {
        border-top: 1px solid #d8dee4;
      }

      .muted {
        color: #57606a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>提取图片地址</h1>
      <p>默认使用你给的 XPath，从当前标签页抓取图片地址。</p>

      <label for="xpath">XPath</label>
      <textarea id="xpath">//div[@class="image-player-content-rLWQU_"]/div/img/@src</textarea>

      <div class="actions">
        <button id="extract" class="primary" type="button">开始提取</button>
        <button id="copy" type="button" disabled>复制结果</button>
      </div>

      <div id="status" class="status"></div>
      <div id="results" class="results muted">还没有结果。</div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
